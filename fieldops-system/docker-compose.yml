version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fieldops_postgres
    restart: always
    environment:
      POSTGRES_USER: admin           # Altere se no seu .env estiver diferente
      POSTGRES_PASSWORD: admin       # Altere se no seu .env estiver diferente
      POSTGRES_DB: fieldops
    ports:
      - "5432:5432"
    volumes:
      - fieldops_pgdata:/var/lib/postgresql/data

volumes:
  fieldops_pgdata: